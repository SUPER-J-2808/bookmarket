<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Campus Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="ui.css">
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-800">
  <div id="toast" class="hidden"></div>

  <div class="flex min-h-screen flex-col items-center justify-center px-4 py-12">
    <div class="mb-8 text-center">
      <p class="text-sm font-semibold text-teal-600">Campus Books</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-tight text-zinc-900">Welcome back</h1>
      <p class="mt-2 text-sm text-zinc-500">Log in to manage listings and orders</p>
    </div>

    <div class="w-full max-w-sm rounded-2xl border border-zinc-200 bg-white p-6 shadow-sm">
      <form onsubmit="loginUser(event)" class="space-y-4">
        <div>
          <label for="email" class="mb-1 block text-xs font-medium text-zinc-600">Email</label>
          <input id="email" type="email" required autocomplete="username"
            class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15"
            placeholder="you@example.com">
        </div>
        <div>
          <label for="password" class="mb-1 block text-xs font-medium text-zinc-600">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15"
            placeholder="••••••••">
        </div>
        <button id="loginBtn" type="submit"
          class="w-full rounded-xl bg-teal-600 py-3 text-sm font-medium text-white shadow-sm hover:bg-teal-700 focus:outline-none focus:ring-4 focus:ring-teal-500/30">
          Continue
        </button>
      </form>

      <div id="loginError" class="mt-4 hidden rounded-xl border border-red-100 bg-red-50 px-3 py-2 text-xs text-red-800" role="alert"></div>

      <p class="mt-6 text-center text-sm text-zinc-600">
        New here?
        <a href="register.html" class="font-medium text-teal-700 hover:text-teal-800">Create an account</a>
      </p>
    </div>

    <p class="mt-8 max-w-sm text-center text-xs leading-relaxed text-zinc-400">
      Run <code class="rounded bg-zinc-100 px-1 py-0.5 font-mono text-zinc-600">npm start</code> in <code class="font-mono">backend</code>, then open
      <span class="font-mono text-zinc-500">http://localhost:5000</span>
    </p>
  </div>

  <script src="auth-pages.js"></script>
</body>
</html>
