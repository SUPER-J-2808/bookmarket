<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Book Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="ui.css">
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-800">
  <div id="toast" class="hidden"></div>

  <header class="sticky top-0 z-40 border-b border-zinc-200/80 bg-white/90 backdrop-blur-md">
    <nav class="mx-auto flex max-w-5xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
      <a href="index.html" class="text-base font-semibold tracking-tight text-zinc-900">Campus Books</a>
      <div class="flex flex-wrap items-center justify-end gap-2 text-sm">
        <a href="index.html" class="rounded-full px-3 py-1.5 text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900">Browse</a>
        <a href="login.html" class="rounded-full px-3 py-1.5 text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900">Log in</a>
        <a href="register.html" class="rounded-full bg-teal-600 px-3 py-1.5 font-medium text-white shadow-sm hover:bg-teal-700">Sign up</a>
        <a href="dashboard.html" class="rounded-full border border-zinc-200 bg-white px-3 py-1.5 text-zinc-700 hover:border-zinc-300">Dashboard</a>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">
    <div class="mb-8 rounded-2xl bg-gradient-to-br from-teal-50 via-white to-zinc-50 p-6 sm:p-8 border border-teal-100/80 shadow-sm">
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 sm:text-3xl">Buy & sell textbooks on campus</h1>
      <p class="mt-2 max-w-xl text-sm leading-relaxed text-zinc-600">Meet students directly. Search by title, branch, or price — then message the seller or send an order request.</p>
    </div>

    <section class="mb-8 rounded-2xl border border-zinc-200 bg-white p-4 shadow-sm sm:p-5">
      <h2 class="mb-4 text-sm font-medium text-zinc-500">Search & filters</h2>
      <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        <label class="block sm:col-span-2">
          <span class="mb-1 block text-xs font-medium text-zinc-500">Title</span>
          <input id="search" class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm placeholder:text-zinc-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="e.g. Data Structures">
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-medium text-zinc-500">Branch</span>
          <input id="branch" class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="CS, Mech…">
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-medium text-zinc-500">Semester</span>
          <input id="semester" type="number" min="1" max="12" class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="1–12">
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-medium text-zinc-500">Min ₹</span>
          <input id="minPrice" type="number" min="0" class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="0">
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-medium text-zinc-500">Max ₹</span>
          <input id="maxPrice" type="number" min="0" class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="Any">
        </label>
        <div class="flex items-end sm:col-span-2 lg:col-span-1">
          <button type="button" onclick="loadBooks()" class="w-full rounded-xl bg-teal-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-teal-700 focus:outline-none focus:ring-4 focus:ring-teal-500/30">Apply filters</button>
        </div>
      </div>
    </section>

    <section id="bookContainer" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
