<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add book — Campus Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="ui.css">
</head>
<body data-auth="true" class="min-h-screen bg-zinc-50 font-sans text-zinc-800">
  <div id="toast" class="hidden"></div>

  <header class="border-b border-zinc-200 bg-white">
    <div class="mx-auto flex max-w-lg items-center justify-between px-4 py-3">
      <a href="dashboard.html" class="text-sm font-medium text-teal-700 hover:text-teal-800">← Dashboard</a>
    </div>
  </header>

  <main class="mx-auto max-w-lg px-4 py-8">
    <h1 class="text-xl font-semibold text-zinc-900">Add a book</h1>
    <p class="mt-1 text-sm text-zinc-500">Shoppers will see this on the home page</p>

    <form id="bookForm" onsubmit="createBook(event)" class="mt-6 space-y-4 rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm">
      <input name="title" required
        class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-4 focus:ring-teal-500/15"
        placeholder="Book title">
      <div class="grid grid-cols-2 gap-3">
        <input name="price" required type="number" min="1" step="1"
          class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-4 focus:ring-teal-500/15"
          placeholder="Price ₹">
        <select name="condition" required class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm">
          <option value="Good">Good</option>
          <option value="New">New</option>
          <option value="Old">Old</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <input name="branch" required value="General" class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm" placeholder="Branch">
        <input name="semester" required type="number" min="1" max="12" value="1" class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm">
      </div>
      <input name="sellerPhone" type="tel" class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm" placeholder="WhatsApp (optional)">
      <input name="image" type="file" accept="image/*" class="w-full text-sm file:mr-2 file:rounded-lg file:bg-teal-50 file:px-3 file:py-2 file:text-teal-800">
      <textarea name="description" rows="2" class="w-full resize-none rounded-xl border border-zinc-200 px-3 py-2.5 text-sm" placeholder="Notes (optional)"></textarea>
      <button type="submit" class="w-full rounded-xl bg-teal-600 py-3 text-sm font-medium text-white hover:bg-teal-700">Publish</button>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
