<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Campus Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="ui.css">
</head>
<body data-auth="true" class="min-h-screen bg-zinc-100 font-sans text-zinc-800">
  <div id="toast" class="hidden"></div>

  <header class="border-b border-zinc-200 bg-zinc-900 text-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
      <div>
        <p class="text-xs font-medium uppercase tracking-wide text-teal-400">Administration</p>
        <h1 class="text-lg font-semibold">Panel</h1>
      </div>
      <div class="flex gap-2 text-sm">
        <a href="dashboard.html" class="rounded-full px-3 py-1.5 text-zinc-300 hover:bg-white/10 hover:text-white">Dashboard</a>
        <button type="button" onclick="logout()" class="rounded-full border border-zinc-600 px-3 py-1.5 hover:bg-white/10">Log out</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">
    <div id="adminData" class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm sm:p-6"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
