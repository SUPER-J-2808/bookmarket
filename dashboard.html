<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Campus Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="ui.css">
</head>
<body data-auth="true" class="min-h-screen bg-zinc-50 font-sans text-zinc-800">
  <div id="toast" class="hidden"></div>

  <header class="border-b border-zinc-200/80 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6">
      <div>
        <p class="text-xs font-medium uppercase tracking-wide text-teal-600">Your space</p>
        <h1 class="text-lg font-semibold text-zinc-900">Dashboard</h1>
      </div>
      <div class="flex flex-wrap items-center gap-2 text-sm">
        <a href="index.html" class="rounded-full px-3 py-1.5 text-zinc-600 hover:bg-zinc-100">Browse books</a>
        <a href="admin.html" class="rounded-full px-3 py-1.5 text-zinc-600 hover:bg-zinc-100">Admin</a>
        <button type="button" onclick="logout()" class="rounded-full border border-zinc-200 bg-white px-3 py-1.5 text-zinc-700 hover:bg-zinc-50">Log out</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl space-y-6 px-4 py-8 sm:px-6">
    <section class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm sm:p-6">
      <h2 class="text-sm font-semibold text-zinc-900">Profile</h2>
      <p class="mt-1 text-xs text-zinc-500">Your account summary</p>
      <div id="profileInfo" class="mt-4 grid gap-2 text-sm text-zinc-700 sm:grid-cols-2"></div>
    </section>

    <section class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm sm:p-6">
      <h2 class="text-sm font-semibold text-zinc-900">List a book for sale</h2>
      <p class="mt-1 text-xs text-zinc-500">Buyers will see this on the marketplace</p>
      <form id="bookForm" onsubmit="createBook(event)" class="mt-5 max-w-lg space-y-4">
        <div>
          <label class="mb-1 block text-xs font-medium text-zinc-500">Title</label>
          <input name="title" required
            class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15"
            placeholder="Book name">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-zinc-500">Price (₹)</label>
            <input name="price" required type="number" min="1" step="1"
              class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15">
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-zinc-500">Condition</label>
            <select name="condition" required
              class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-4 focus:ring-teal-500/15">
              <option value="Good">Good</option>
              <option value="New">New</option>
              <option value="Old">Old</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-zinc-500">Branch</label>
            <input name="branch" required value="General"
              class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15"
              placeholder="e.g. CS">
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-zinc-500">Semester</label>
            <input name="semester" required type="number" min="1" max="12" value="1"
              class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15">
          </div>
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium text-zinc-500">WhatsApp <span class="font-normal text-zinc-400">(optional)</span></label>
          <input name="sellerPhone" type="tel"
            class="w-full rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15"
            placeholder="Country code + number">
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium text-zinc-500">Photo <span class="font-normal text-zinc-400">(optional)</span></label>
          <input name="image" type="file" accept="image/*"
            class="w-full text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-teal-50 file:px-3 file:py-2 file:text-sm file:font-medium file:text-teal-800 hover:file:bg-teal-100">
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium text-zinc-500">Notes <span class="font-normal text-zinc-400">(optional)</span></label>
          <textarea name="description" rows="2"
            class="w-full resize-none rounded-xl border border-zinc-200 bg-zinc-50/50 px-3 py-2.5 text-sm focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/15"
            placeholder="Edition, highlights, etc."></textarea>
        </div>
        <button type="submit" class="w-full rounded-xl bg-teal-600 py-3 text-sm font-medium text-white shadow-sm hover:bg-teal-700 focus:outline-none focus:ring-4 focus:ring-teal-500/30 sm:w-auto sm:px-8">
          Publish listing
        </button>
      </form>
    </section>

    <section class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm sm:p-6">
      <h2 class="text-sm font-semibold text-zinc-900">Order requests</h2>
      <p class="mt-1 text-xs text-zinc-500">Incoming and outgoing</p>
      <ul id="orderList" class="mt-4 divide-y divide-zinc-100 text-sm"></ul>
    </section>

    <section class="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm sm:p-6">
      <h2 class="text-sm font-semibold text-zinc-900">Rate a seller</h2>
      <p class="mt-1 text-xs text-zinc-500">After a purchase, leave quick feedback</p>
      <form onsubmit="rateSeller(event)" class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-4 lg:items-end">
        <div class="sm:col-span-2">
          <label class="mb-1 block text-xs font-medium text-zinc-500">Seller user ID</label>
          <input id="sellerId" required class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="From their profile">
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium text-zinc-500">Stars</label>
          <input id="stars" required type="number" min="1" max="5" class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="1–5">
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium text-zinc-500">Comment <span class="text-zinc-400">(optional)</span></label>
          <input id="review" class="w-full rounded-xl border border-zinc-200 px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-4 focus:ring-teal-500/15" placeholder="Short note">
        </div>
        <div class="sm:col-span-2 lg:col-span-1">
          <button type="submit" class="w-full rounded-xl bg-zinc-900 py-2.5 text-sm font-medium text-white hover:bg-zinc-800">Submit</button>
        </div>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
